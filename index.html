<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>룰렛 보관함</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <button class="mobile-sidebar-toggle" id="mobileSidebarToggle" type="button" aria-label="사이드바 닫기" aria-expanded="true">☰</button>
      <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
      <aside class="sidebar" aria-label="룰렛 보관함">
        <div class="brand">
          <div class="brand-mark">R</div>
          <div>
            <h1>룰렛 보관함</h1>
            <p class="brand-subtitle">Roulette Studio</p>
          </div>
          <button class="sidebar-close-button" id="sidebarCloseButton" type="button" aria-label="사이드바 접기">‹</button>
        </div>

        <section class="account-compact" aria-label="계정">
          <button class="account-avatar" id="accountMenuButton" type="button" aria-label="계정 메뉴" aria-expanded="false">?</button>
          <div class="account-summary">
            <span>계정</span>
            <strong id="accountSummaryText">로그인 필요</strong>
          </div>
          <div class="account-popover" id="accountPopover" hidden>
            <p class="eyebrow">Account</p>
            <strong id="userEmail">로그인하지 않음</strong>
            <p class="account-status" id="syncStatus">로그인하면 자동 동기화됩니다.</p>
            <div class="account-actions">
              <button class="ghost-dark-button" id="signInButton" type="button">Google 로그인</button>
              <button class="ghost-dark-button" id="signOutButton" type="button">로그아웃</button>
            </div>
          </div>
        </section>

        <div class="section-title">
          <span>내 룰렛</span>
          <button class="icon-button" id="addProjectButton" type="button" title="프로젝트 추가" aria-label="프로젝트 추가">
            +
          </button>
        </div>
        <div class="project-list" id="projectList"></div>

        <div class="section-title shared-title">
          <span>공동작업 룰렛</span>
          <button class="icon-button" id="joinSharedButton" type="button" title="공유 룰렛 입장" aria-label="공유 룰렛 입장">
            +
          </button>
        </div>
        <div class="project-list" id="sharedProjectList"></div>
      </aside>
      <div class="sidebar-resizer" id="sidebarResizer" role="separator" aria-orientation="vertical" aria-label="사이드바 크기 조절"></div>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="workspaceTypeLabel">내 프로젝트</p>
            <input class="project-name-input" id="projectNameInput" aria-label="프로젝트 이름" />
          </div>
          <div class="topbar-actions">
            <button class="tool-button" id="shareProjectButton" type="button" title="룰렛 공유" aria-label="룰렛 공유">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7" />
                <path d="M12 15V3" />
                <path d="m7 8 5-5 5 5" />
              </svg>
            </button>
            <button class="tool-button danger-tool" id="deleteProjectButton" type="button" title="프로젝트 삭제" aria-label="프로젝트 삭제">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18" />
                <path d="M8 6V4h8v2" />
                <path d="M6 6l1 14h10l1-14" />
                <path d="M10 11v5" />
                <path d="M14 11v5" />
              </svg>
            </button>
            <div class="more-menu">
              <button class="more-button" id="moreActionsButton" type="button" aria-label="추가 작업" aria-expanded="false">⋯</button>
              <div class="more-menu-panel" id="moreActionsPanel" hidden>
                <button id="exportButton" type="button">백업</button>
                <label class="menu-file-action" for="importInput">복원</label>
                <input id="importInput" type="file" accept="application/json" hidden />
              </div>
            </div>
          </div>
        </header>

        <nav class="roulette-tabs" id="rouletteTabs" aria-label="룰렛 탭"></nav>

        <section class="content-grid">
          <section class="wheel-panel" aria-label="룰렛">
            <div class="wheel-header">
              <div>
                <p class="eyebrow">선택한 룰렛</p>
                <input class="roulette-title-input" id="rouletteTitleInput" aria-label="룰렛 제목" />
              </div>
            </div>

            <div class="wheel-stage">
              <div class="pointer" aria-hidden="true"></div>
              <canvas id="wheelCanvas" width="560" height="560" aria-label="룰렛 판"></canvas>
              <button class="wheel-center" id="spinButton" type="button" aria-label="룰렛 돌리기">
                <span>SPIN</span>
              </button>
            </div>

            <div class="result-box" id="resultBox" role="status" aria-live="polite">항목을 넣고 룰렛을 돌려보세요.</div>
          </section>

          <section class="editor-panel" aria-label="룰렛 편집">
            <div class="panel-header">
              <div>
                <p class="eyebrow">항목 편집</p>
                <h2>룰렛 구성</h2>
              </div>
              <button class="ghost-button" id="deleteRouletteButton" type="button">룰렛 삭제</button>
            </div>

            <form class="add-item-form" id="addItemForm">
              <input id="itemInput" type="text" placeholder="새 항목 입력" autocomplete="off" />
              <button class="primary-button" type="submit">추가</button>
            </form>

            <div class="item-list" id="itemList"></div>
          </section>
        </section>
      </main>
    </div>

    <dialog class="share-dialog" id="shareDialog">
      <form method="dialog" class="dialog-card" id="shareForm">
        <div>
          <p class="eyebrow">Share</p>
          <h2 id="shareDialogTitle">룰렛 공유</h2>
        </div>
        <label>
          <span>공유 비밀번호</span>
          <input id="sharePasswordInput" type="password" autocomplete="new-password" required />
        </label>
        <label id="shareLinkField" hidden>
          <span>공유 링크</span>
          <div class="copy-row">
            <input id="shareLinkInput" type="text" readonly />
            <button class="ghost-button" id="copyShareLinkButton" type="button" aria-label="공유 링크 복사">복사</button>
          </div>
          <span class="copy-feedback" id="copyShareFeedback" hidden>복사되었습니다.</span>
        </label>
        <div class="dialog-actions">
          <button class="ghost-button" id="cancelShareButton" type="button">닫기</button>
          <button class="primary-button" id="confirmShareButton" type="submit">공유 만들기</button>
        </div>
      </form>
    </dialog>

    <dialog class="share-dialog" id="deleteDialog">
      <div class="dialog-card">
        <div>
          <p class="eyebrow">Delete</p>
          <h2>프로젝트 삭제</h2>
        </div>
        <p class="dialog-copy" id="deleteDialogMessage">삭제 방식을 선택하세요.</p>
        <div class="delete-options" id="sharedDeleteOptions">
          <button class="ghost-button" id="deleteForMeButton" type="button">나에게서만 삭제</button>
          <button class="danger-button" id="deleteForEveryoneButton" type="button">모두에게서 삭제</button>
        </div>
        <div class="dialog-actions">
          <button class="ghost-button" id="cancelDeleteButton" type="button">취소</button>
          <button class="danger-button" id="confirmPersonalDeleteButton" type="button">삭제</button>
        </div>
      </div>
    </dialog>

    <script src="firebase-config.js?v=20260520"></script>
    <script src="app.js?v=20260521-copy-button-check"></script>
  </body>
</html>
